<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Board 🎨 — Elizabeth's Elegance</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* =========================================================
           Mood Board — Light Aesthetic Page (Printable)
        ========================================================= */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{
            --mb-bg: #F8F4E6; --mb-green: #2A5C43; --mb-gold: #D4AF37;
            --mb-border: #e2dcc8; --mb-surface: #ffffff;
        }

        body{
            font-family:'Outfit',sans-serif;
            background:var(--mb-bg); color:#333;
            height:100vh; display:flex; flex-direction:column; overflow:hidden;
        }

        /* Nav */
        .ai-nav{
            display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:15px;
            padding:15px 40px; border-bottom:1px solid var(--mb-border);
            background:var(--mb-surface); z-index:20; flex-shrink:0;
        }
        .ai-brand{
            font-family:'Great Vibes',cursive;font-size:32px;color:var(--mb-green);
            text-decoration:none;
        }
        .nav-links{display:flex;gap:10px;flex-wrap:wrap;}
        .nav-link{
            color:#666;font-size:13px;font-weight:500;
            padding:6px 14px;border-radius:20px; text-decoration:none;
            border:1px solid var(--mb-border);background:var(--mb-bg);
            transition:all .2s;
        }
        .nav-link:hover,.nav-link.active{
            color:white;background:var(--mb-green); border-color:var(--mb-green);
        }

        /* Layout */
        .board-container {
            display:flex; flex:1; overflow:hidden;
        }

        /* LEFT PANEL: Browser */
        .browser-panel {
            width:350px; background:var(--mb-surface); border-right:1px solid var(--mb-border);
            display:flex; flex-direction:column; flex-shrink:0;
        }
        .browser-header {
            padding:20px; border-bottom:1px solid var(--mb-border); background:#fcfbf7;
        }
        .browser-header h3 { font-size:18px; color:var(--mb-green); margin-bottom:10px; display:flex; align-items:center; gap:8px;}
        .search-input {
            width:100%; padding:10px 15px; border-radius:10px; border:1px solid var(--mb-border);
            outline:none; font-family:'Outfit'; font-size:13px; margin-bottom:10px; background:var(--mb-bg);
        }
        .filters { display:flex; gap:6px; flex-wrap:wrap; }
        .pill {
            padding:4px 10px; border-radius:12px; border:1px solid var(--mb-border);
            font-size:11px; font-weight:600; cursor:pointer; background:white; color:#555;
        }
        .pill.active { background:var(--mb-green); color:white; border-color:var(--mb-green); }

        .items-list {
            flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px;
        }
        .list-item {
            display:flex; gap:12px; align-items:center; padding:8px;
            border-radius:10px; border:1px solid var(--mb-border); transition:all 0.2s;
        }
        .list-item:hover { border-color:var(--mb-green); background:#fcfbf7; }
        .li-img { width:45px; height:60px; object-fit:contain; border-radius:6px; background:var(--mb-bg); }
        .li-info { flex:1; min-width:0; }
        .li-name { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .li-cat { font-size:10px; color:var(--mb-green); font-weight:700; text-transform:uppercase; margin-top:2px; }
        .li-add {
            width:28px; height:28px; border-radius:50%; border:none; background:var(--mb-green); color:white;
            cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center;
            flex-shrink:0; transition:all 0.2s;
        }
        .li-add:hover { transform:scale(1.1); }
        .li-add.added { background:#e5e5e5; color:#999; cursor:default; }

        /* RIGHT PANEL: Canvas */
        .canvas-panel {
            flex:1; display:flex; flex-direction:column; background:var(--mb-bg); position:relative;
        }
        .canvas-header {
            padding:25px 40px 10px; text-align:center;
        }
        .canvas-title {
            font-family:'Great Vibes',cursive; font-size:48px; color:var(--mb-green); margin-bottom:5px;
        }
        .canvas-subtitle { font-size:14px; color:#666; }

        /* Mood Board Masonry Layout */
        .board-area {
            flex:1; overflow-y:auto; padding:20px 40px 100px;
        }
        .masonry-grid {
            column-count: 3; column-gap: 20px;
        }
        @media (max-width: 1200px) { .masonry-grid { column-count: 2; } }
        
        .board-item {
            break-inside: avoid; margin-bottom:20px;
            background:white; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.05);
            overflow:hidden; position:relative; transition:transform 0.3s, box-shadow 0.3s;
            border:1px solid rgba(0,0,0,0.02);
        }
        .board-item:hover { transform:translateY(-5px); box-shadow:0 10px 25px rgba(0,0,0,0.1); }
        
        .bi-img { width:100%; display:block; object-fit:contain; background:#fafafa; min-height:150px; }
        .bi-footer { padding:10px 15px; display:flex; justify-content:space-between; align-items:center; }
        .bi-cat { font-size:11px; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:1px; }
        
        .bi-controls { display:flex; gap:5px; opacity:0; transition:opacity 0.2s; }
        .board-item:hover .bi-controls { opacity:1; }
        
        .bi-btn {
            width:24px; height:24px; border-radius:50%; border:none; background:#f0f0f0;
            display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:10px;
        }
        .bi-btn:hover { background:#e0e0e0; }
        .bi-remove { background:#fee2e2; color:#ef4444; }
        .bi-remove:hover { background:#fca5a5; }

        /* Empty State */
        .empty-board {
            border:2px dashed var(--mb-border); border-radius:20px;
            height:300px; display:flex; flex-direction:column; align-items:center; justify-content:center;
            color:#888; font-size:18px; margin-top:20px;
        }

        /* Color Palette Box */
        .palette-section {
            background:white; border-radius:16px; padding:20px; margin-bottom:20px;
            box-shadow:0 4px 15px rgba(0,0,0,0.03); border:1px solid var(--mb-border);
        }
        .pal-title { font-size:14px; font-weight:700; margin-bottom:15px; color:var(--mb-green); }
        .color-row { display:flex; gap:10px; }
        .color-swatch {
            width:40px; height:40px; border-radius:50%; border:2px solid white;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        /* Bottom Actions */
        .action-bar {
            position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
            background:white; padding:10px 20px; border-radius:30px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1); border:1px solid var(--mb-border);
            display:flex; gap:15px; z-index:30;
        }
        .act-btn {
            border:none; background:transparent; font-family:'Outfit'; font-size:14px; font-weight:600;
            color:#555; cursor:pointer; display:flex; align-items:center; gap:6px; padding:8px 12px;
            border-radius:20px; transition:all 0.2s;
        }
        .act-btn:hover { background:#f5f5f5; color:var(--mb-green); }

        /* Toast */
        .toast {
            position:fixed; top:20px; right:20px; background:var(--mb-green); color:white;
            padding:12px 24px; border-radius:8px; font-weight:600; font-size:14px;
            transform:translateX(150%); transition:transform 0.3s; z-index:1000;
        }
        .toast.show { transform:translateX(0); }

        /* Print Styles */
        @media print {
            body { background:white; height:auto; overflow:visible; }
            .ai-nav, .browser-panel, .action-bar { display:none !important; }
            .canvas-panel { background:white; }
            .board-area { padding:0; overflow:visible; }
            .board-item { box-shadow:none; border:1px solid #ddd; break-inside:avoid; }
            .bi-controls { display:none !important; }
        }
    </style>
</head>
<body>

    <nav class="ai-nav">
        <a href="index.html" class="ai-brand">Elizabeth's Elegance</a>
                        <div class="nav-links">
            <a href="index.html" class="nav-link">🏠 Головна</a>
            <a href="my-profile.html" class="nav-link">👤 Мій профіль</a>
            <a href="ai-stylist.html" class="nav-link">✨ AI Stylist</a>
            <a href="style-quiz.html" class="nav-link">🎯 Style Quiz</a>
            <a href="weather-outfit.html" class="nav-link">🌡️ Weather</a>
            <a href="capsule-wardrobe.html" class="nav-link">📅 Capsule</a>
            <a href="mood-board.html" class="nav-link active">🎨 Mood Board</a>
            <a href="trend-radar.html" class="nav-link">📊 Trends</a>
            <a href="virtual-silhouette.html" class="nav-link">👗 Silhouette</a>
        </div>
    </nav>

    <div class="board-container">
        
        <!-- Left Panel: Browser -->
        <div class="browser-panel">
            <div class="browser-header">
                <h3>🛍️ Оберіть товари</h3>
                <input type="text" class="search-input" id="search-input" placeholder="Пошук товарів..." oninput="renderList()">
                <div class="filters" id="filters">
                    <button class="pill active" onclick="setFilter('')">Всі</button>
                    <button class="pill" onclick="setFilter('Dresses')">Сукні</button>
                    <button class="pill" onclick="setFilter('Tops')">Верх</button>
                    <button class="pill" onclick="setFilter('Bottoms')">Низ</button>
                    <button class="pill" onclick="setFilter('Jackets')">Куртки</button>
                </div>
            </div>
            <div class="items-list" id="items-list">
                <p style="text-align:center;color:#999;font-size:12px;margin-top:20px;">Завантаження...</p>
            </div>
        </div>

        <!-- Right Panel: Canvas -->
        <div class="canvas-panel">
            <div class="canvas-header">
                <h1 class="canvas-title">Мій Mood Board</h1>
                <div class="canvas-subtitle" id="board-subtitle">0 речей на дошці</div>
            </div>
            
            <div class="board-area">
                
                <!-- Color Palette -->
                <div class="palette-section">
                    <div class="pal-title">🎨 Палітра настрою</div>
                    <div class="color-row" id="palette">
                        <!-- Default beige/green palette -->
                        <div class="color-swatch" style="background:#2A5C43;"></div>
                        <div class="color-swatch" style="background:#557A65;"></div>
                        <div class="color-swatch" style="background:#D4AF37;"></div>
                        <div class="color-swatch" style="background:#F4E8C1;"></div>
                        <div class="color-swatch" style="background:#F8F4E6;"></div>
                    </div>
                </div>

                <!-- Masonry Grid -->
                <div id="masonry" class="masonry-grid">
                    <div class="empty-board" id="empty-state">
                        <div>✨</div>
                        <div>Додайте товари зліва, щоб почати</div>
                    </div>
                </div>
            </div>

            <!-- Action Bar -->
            <div class="action-bar">
                <button class="act-btn" onclick="saveBoard()">💾 Зберегти</button>
                <button class="act-btn" onclick="window.print()">🖨️ Друк</button>
                <button class="act-btn" onclick="clearBoard()" style="color:#ef4444;">🗑️ Очистити</button>
            </div>
        </div>

    </div>

    <div class="toast" id="toast">Повідомлення</div>

    <script>
        let allProducts = [];
        let boardItems = []; // Array of clothing_ids in order
        let currentFilter = '';

        // Load catalog
        fetch('data/products.json').then(r=>r.json()).then(data => {
            // Keep top 200 by rating for the browser
            allProducts = data.filter(p => p.avg_rating).sort((a,b) => b.avg_rating - a.avg_rating).slice(0, 200);
            loadBoard();
            renderList();
        });

        function setFilter(dept) {
            currentFilter = dept;
            document.querySelectorAll('.pill').forEach(p => {
                p.classList.toggle('active', p.textContent === (dept==='Dresses'?'Сукні':dept==='Tops'?'Верх':dept==='Bottoms'?'Низ':dept==='Jackets'?'Куртки':'Всі'));
            });
            renderList();
        }

        function renderList() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const list = document.getElementById('items-list');
            
            let filtered = allProducts;
            if(currentFilter) filtered = filtered.filter(p => p.department_name === currentFilter);
            if(query) filtered = filtered.filter(p => (p.title||'').toLowerCase().includes(query) || (p.class_name||'').toLowerCase().includes(query));

            list.innerHTML = filtered.slice(0, 50).map(p => {
                const isAdded = boardItems.includes(p.clothing_id);
                return `
                <div class="list-item">
                    <img src="static/${p.clothing_id}.jpg" class="li-img" onerror="this.style.display='none'">
                    <div class="li-info">
                        <div class="li-name" title="${p.title||''}">${p.title ? p.title : p.class_name}</div>
                        <div class="li-cat">${p.class_name || p.department_name}</div>
                    </div>
                    <button class="li-add ${isAdded?'added':''}" onclick="add(${p.clothing_id})" ${isAdded?'disabled':''}>
                        ${isAdded ? '✓' : '+'}
                    </button>
                </div>
                `;
            }).join('');
        }

        function add(id) {
            if(boardItems.includes(id)) return;
            boardItems.push(id);
            renderList(); // update button state
            renderBoard();
        }

        function remove(id) {
            boardItems = boardItems.filter(i => i !== id);
            renderList();
            renderBoard();
        }

        function move(id, dir) {
            const idx = boardItems.indexOf(id);
            if(idx === -1) return;
            if(dir === 'up' && idx > 0) {
                [boardItems[idx-1], boardItems[idx]] = [boardItems[idx], boardItems[idx-1]];
            } else if(dir === 'down' && idx < boardItems.length - 1) {
                [boardItems[idx], boardItems[idx+1]] = [boardItems[idx+1], boardItems[idx]];
            }
            renderBoard();
        }

        function renderBoard() {
            const masonry = document.getElementById('masonry');
            document.getElementById('board-subtitle').textContent = `${boardItems.length} речей на дошці`;
            
            if(boardItems.length === 0) {
                masonry.innerHTML = `<div class="empty-board"><div>✨</div><div>Додайте товари зліва, щоб почати</div></div>`;
                return;
            }

            // Map ids to full objects
            const items = boardItems.map(id => allProducts.find(p => p.clothing_id === id)).filter(Boolean);
            
            masonry.innerHTML = items.map(p => `
                <div class="board-item">
                    <img src="static/${p.clothing_id}.jpg" class="bi-img" onerror="this.src='https://via.placeholder.com/300x400/fafafa/ccc?text=Image'">
                    <div class="bi-footer">
                        <div class="bi-cat">${p.class_name || p.department_name}</div>
                        <div class="bi-controls">
                            <button class="bi-btn" onclick="move(${p.clothing_id}, 'up')">↑</button>
                            <button class="bi-btn" onclick="move(${p.clothing_id}, 'down')">↓</button>
                            <button class="bi-btn bi-remove" onclick="remove(${p.clothing_id})">✕</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function clearBoard() {
            if(confirm('Ви впевнені, що хочете очистити дошку?')) {
                boardItems = [];
                renderList();
                renderBoard();
            }
        }

        function saveBoard() {
            localStorage.setItem('mood_board_items', JSON.stringify(boardItems));
            showToast('Mood Board збережено!');
        }

        function loadBoard() {
            const saved = localStorage.getItem('mood_board_items');
            if(saved) {
                try {
                    boardItems = JSON.parse(saved);
                    renderBoard();
                } catch(e) {}
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
